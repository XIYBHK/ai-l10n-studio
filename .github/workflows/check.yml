name: Check

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-20-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-
            ${{ runner.os }}-node-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Collect changed files for Prettier
        id: prettier-files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA=$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.json' '*.md' '*.yml' '*.yaml' '*.css' '*.html')

          if [[ -n "$CHANGED_FILES" ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            {
              echo 'files<<EOF'
              echo "$CHANGED_FILES"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Prettier formatting
        if: steps.prettier-files.outputs.has_files == 'true'
        shell: bash
        run: |
          FILES=()
          while IFS= read -r file; do
            if [[ -n "$file" ]]; then
              FILES+=("$file")
            fi
          done <<'EOF'
          ${{ steps.prettier-files.outputs.files }}
          EOF

          echo "Checking files:"
          printf '%s\n' "${FILES[@]}"
          npx prettier --check "${FILES[@]}"

      - name: Check cargo fmt
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test --quiet

      - name: Run Rust clippy
        working-directory: ./src-tauri
        run: cargo clippy --lib --bins --all-features -- -D warnings
